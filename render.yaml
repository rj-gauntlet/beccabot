# BeccaBot - Render.com deployment
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: beccabot
    runtime: docker
    dockerfilePath: ./Dockerfile

    disk:
      name: beccabot-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: DATA_DIR
        value: /data
      - key: OPENAI_API_KEY
        sync: false
      - key: DOCUMENTS_PIN
        sync: false
      - key: OPENWEATHERMAP_API_KEY
        sync: false
      - key: HOUSING_ADDRESS
        sync: false
      - key: OFFICE_ADDRESS
        sync: false
      - key: REBECCA_EMAIL
        sync: false
